playbooks:
  - id: google_ads_search_playbook
    family: google_ads_search_playbook
    title: Diagnostyka wyszukiwanych haseł Google Ads
    card_type: ads_pattern_card
    source_anchors:
      - Google Ads search terms
      - Google Ads API diagnostics
    required_evidence:
      - search_terms
      - campaign_ids
      - metrics
      - evidence_ids
    maps_to_opportunity_types:
      - google_ads_waste
      - google_ads_negative_keywords
      - content_brief_candidate
    maps_to_action_types:
      - prepare_negative_keywords
      - content_brief_candidate
      - custom_segment_candidate
    expert_rule_ids:
      - ads_search_terms_v1
      - ads_diagnostics_v1
    compact_playbook: Używaj realnych metryk wyszukiwanych haseł do rozdzielenia strat, kandydatów treści i kandydatów odbiorców. Nie rekomenduj wykluczeń, treści ani segmentów bez dowodów i zakresu kampanii.
    refusal_rules:
      - Odmów klasyfikacji intencji bez dowodów z wyszukiwanych haseł.
      - Odmów rekomendacji zmiany wydatków wyłącznie na podstawie statusu źródła danych.
    output_contract: Okazja z wyszukiwanych haseł oparta o dowody i opcjonalne zwalidowane akcje.

  - id: google_ads_budget_review_playbook
    family: google_ads_budget_review_playbook
    title: Przegląd budżetów Google Ads
    card_type: campaign_card
    source_anchors:
      - Google Ads campaign budgets
      - Google Ads recommendations review
    required_evidence:
      - campaign_budget
      - cost_micros
      - campaign_ids
      - evidence_ids
    maps_to_opportunity_types:
      - google_ads_waste
      - google_ads_budget_review
    maps_to_action_types:
      - campaign_change_review
    expert_rule_ids:
      - ads_scaling_candidates_v1
      - ads_recommendations_v1
      - ads_principles_v1
    compact_playbook: Używaj budżetu kampanii i ostatnich kosztów tylko jako kontekstu walidacji. Nie skaluj, nie tnij i nie zapisuj budżetów bez udziału w wyświetleniach, historii zmian, celu biznesowego, podglądu zmiany i walidacji akcji.
    refusal_rules:
      - Odmów zmian budżetu bez dowodów dla budżetu kampanii.
      - Blokuj oceny opłacalności i zmarnowanego budżetu bez marży, jakości konwersji oraz kontraktów review.
      - Odmów automatycznego wdrożenia rekomendacji Google.
    output_contract: Decyzja przeglądu budżetu z dowodami, brakującymi danymi i zablokowanymi twierdzeniami o zapisie zmian.

  - id: google_ads_demand_gen_playbook
    family: google_ads_demand_gen_playbook
    title: Gotowość Demand Gen
    card_type: ads_pattern_card
    source_anchors:
      - Google Ads Demand Gen
      - Demand Gen campaign mode review
    required_evidence:
      - display_campaigns
      - assets
      - audiences
      - goals
      - evidence_ids
    maps_to_opportunity_types:
      - display_to_demand_gen_mode_review
      - demand_gen_asset_readiness
    maps_to_action_types:
      - prepare_demand_gen_mode_review_plan
      - prepare_demand_gen_campaign
    expert_rule_ids:
      - ads_demand_gen_v1
    compact_playbook: Sprawdź tryb kampanii, gotowość zasobów, cele i stan odbiorców przed przygotowaniem działań Demand Gen. Zmiany automatycznych ulepszeń AI muszą być jawne.
    refusal_rules:
      - Odmów oceny trybu kampanii bez dowodów kampanii i zasobów.
      - Odmów cichego włączenia automatycznych ulepszeń AI.
    output_contract: Okazja gotowości Demand Gen z dowodami i podglądem zmiany.

  - id: google_ads_pmax_playbook
    family: google_ads_pmax_playbook
    title: Gotowość PMax i sprzedaży produktowej
    card_type: campaign_card
    source_anchors:
      - Google Ads PMax channels
      - Merchant API
    required_evidence:
      - campaign_channel_state
      - asset_groups
      - merchant_feed_status
      - evidence_ids
    maps_to_opportunity_types:
      - pmax_retail_readiness_gap
      - shopping_campaign_candidate
    maps_to_action_types:
      - ads_pmax_asset_review
      - ads_merchant_review
    expert_rule_ids:
      - ads_capability_pack_v1
      - merchant_feed_rules_v1
    compact_playbook: Łącz rekomendacje PMax ze zdrowiem Merchant/feedu i dowodami zasobów przed sugerowaniem zmian kampanii sprzedażowych.
    refusal_rules:
      - Odmów optymalizacji produktów bez diagnostyki produktu i feedu.
      - Odmów traktowania rekomendacji Google jako automatycznie dopasowanych biznesowo.
    output_contract: Okazja gotowości sprzedaży produktowej powiązana z feedem i kandydatami akcji kampanii.

  - id: google_ads_negative_keywords_playbook
    family: google_ads_negative_keywords_playbook
    title: Przegląd wykluczeń Google Ads
    card_type: negative_keyword_pattern_card
    source_anchors:
      - Google Ads negative keywords
      - Google Ads search terms
    required_evidence:
      - search_terms
      - spend
      - conversions
      - match_type
      - evidence_ids
    maps_to_opportunity_types:
      - google_ads_negative_keywords
      - google_ads_waste
    maps_to_action_types:
      - prepare_negative_keywords
    expert_rule_ids:
      - ads_negative_keywords_v1
      - ads_search_terms_v1
    compact_playbook: Przygotuj wykluczenia tylko wtedy, gdy realne wyszukiwane hasła pokazują stratę, brak konwersji i bezpieczny zakres kampanii. Frazy brandowe i wysokiej intencji zostaw do sprawdzenia przez człowieka.
    refusal_rules:
      - Odmów akcji wykluczeń bez dowodów źródłowych.
      - Odmów szerokich wykluczeń, które mogą zablokować wartościową intencję bez sprawdzenia.
    output_contract: Zwalidowane akcje wykluczeń z dowodami wyszukiwanych haseł.

  - id: google_ads_custom_segments_playbook
    family: google_ads_custom_segments_playbook
    title: Segmenty niestandardowe z wyszukiwanych haseł
    card_type: keyword_cluster_card
    source_anchors:
      - Google Ads custom segments
      - Keyword Planner
    required_evidence:
      - search_terms
      - campaign_context
      - evidence_ids
      - custom_segment_change_preview
    maps_to_opportunity_types:
      - custom_segment_candidate
    maps_to_action_types:
      - prepare_custom_segment
      - prepare_custom_segment_review
    expert_rule_ids:
      - ads_custom_segments_v1
      - ads_keyword_planner_v1
    compact_playbook: Buduj propozycje segmentów do sprawdzenia z realnych wyszukiwanych haseł. Pokazuj odrzucone frazy o niskiej intencji albo wymyślone hasła. Wymagaj wzbogacenia Keyword Planner, prognozy albo rozmiaru odbiorców i decyzji człowieka przed zapisem zmian.
    refusal_rules:
      - Odmów wymyślonych fraz odbiorców.
      - Odmów przygotowania segmentu bez źródłowych wyszukiwanych haseł.
    output_contract: Propozycja segmentu niestandardowego z dowodami, odrzuconymi frazami, podglądem zmiany i zablokowanym zapisem.

  - id: gsc_seo_content_playbook
    family: gsc_seo_content_playbook
    title: Okazje SEO i content z GSC
    card_type: content_card
    source_anchors:
      - Google Search Console Search Analytics
      - WordPress content inventory
    required_evidence:
      - query_page_metrics
      - clicks
      - impressions
      - ctr
      - position
      - evidence_ids
    maps_to_opportunity_types:
      - gsc_ctr_opportunity
      - gsc_content_decay
      - gsc_cannibalization
    maps_to_action_types:
      - content_refresh
      - title_meta_revision
      - internal_link_candidate
    expert_rule_ids:
      - seo_gsc_opportunities_v1
      - seo_query_page_matrix_v1
    compact_playbook: "Używaj dowodów zapytanie/strona do decyzji: odświeżenie, scalenie, link wewnętrzny albo brak działania. Sprawdź istniejącą treść przed rekomendacją nowej strony."
    refusal_rules:
      - Odmów nowej treści, jeśli istniejąca strona spełnia intencję.
      - Odmów diagnozy CTR albo spadku bez dowodów z GSC.
    output_contract: Okazja SEO z dowodami zapytanie/strona i kandydatem akcji treściowej.

  - id: ahrefs_content_gap_playbook
    family: ahrefs_content_gap_playbook
    title: Luki contentowe i konkurencja z Ahrefs
    card_type: competitor_card
    source_anchors:
      - Ahrefs API v3
      - Site Explorer
    required_evidence:
      - competitor_domains
      - keyword_gaps
      - pages
      - evidence_ids
    maps_to_opportunity_types:
      - ahrefs_content_gap
      - ahrefs_competitor_gap
      - ahrefs_backlink_gap
    maps_to_action_types:
      - content_brief_candidate
      - internal_link_candidate
    expert_rule_ids:
      - content_brief_rules_v1
    compact_playbook: Zamieniaj dowody konkurencji i luk treści w briefy dopiero po sprawdzeniu spisu treści Ekologus i ścieżki źródłowej.
    refusal_rules:
      - Odmów ogólnych porad o konkurencji bez dowodów z Ahrefs.
      - Odmów rekomendacji linków bez źródłowych adresów URL.
    output_contract: Okazja luki treści z dowodami konkurencji i akcją briefu.

  - id: localo_local_seo_playbook
    family: localo_local_seo_playbook
    title: Widoczność lokalna Localo
    card_type: local_visibility_card
    source_anchors:
      - Localo API/MCP
      - Google Business Profile visibility
    required_evidence:
      - local_rankings
      - competitors
      - reviews
      - evidence_ids
    maps_to_opportunity_types:
      - localo_visibility_drop
    maps_to_action_types:
      - local_visibility_task
      - review_response_candidate
    expert_rule_ids:
      - local_visibility_v1
      - local_reviews_v1
    compact_playbook: Diagnozuj spadki lokalnych pozycji, luki względem konkurencji i zadania review z dowodów Localo/GBP przed sugerowaniem zmian publicznych.
    refusal_rules:
      - Blokuj propozycje zapisu zmian w profilu firmy bez dowodu sprawdzenia.
      - Odmów diagnozy lokalnych pozycji bez kontekstu lokalizacji i konkurencji.
    output_contract: Zadanie widoczności lokalnej albo kandydat odpowiedzi na opinię z dowodami źródłowymi.

  - id: ga4_behavior_diagnostics_playbook
    family: ga4_behavior_diagnostics_playbook
    title: Diagnostyka zachowania GA4
    card_type: campaign_card
    source_anchors:
      - GA4 Data API
      - Ads/GSC landing behavior
    required_evidence:
      - events
      - conversions
      - landing_pages
      - source_medium
      - evidence_ids
    maps_to_opportunity_types:
      - ga4_landing_page_issue
      - ga4_campaign_quality_issue
      - ga4_tracking_gap
    maps_to_action_types:
      - ga4_tracking_gap
      - ga4_landing_page_issue
    expert_rule_ids:
      - ga4_diagnostics_v1
    compact_playbook: Oddzielaj braki pomiaru od problemów marketingowych przez połączenie danych pozyskania ruchu z zaangażowaniem i dowodami konwersji.
    refusal_rules:
      - Odmów twierdzeń o jakości konwersji bez dowodów z GA4.
      - Odmów obwiniania kampanii, gdy brakuje pomiaru.
    output_contract: Okazja diagnostyczna GA4 z akcją pomiaru albo strony wejścia.

  - id: merchant_feed_optimization_playbook
    family: merchant_feed_optimization_playbook
    title: Diagnostyka feedu Merchant
    card_type: service_card
    source_anchors:
      - Merchant API
      - Product feed diagnostics
    required_evidence:
      - merchant_account
      - feed_status
      - product_status
      - product_data
      - evidence_ids
    maps_to_opportunity_types:
      - merchant_feed_issue
      - merchant_product_title_rewrite
      - merchant_product_description_rewrite
    maps_to_action_types:
      - merchant_feed_issue
      - merchant_product_title_rewrite
      - merchant_product_description_rewrite
    expert_rule_ids:
      - merchant_feed_rules_v1
      - merchant_product_diagnostics_v1
    compact_playbook: Przygotuj działania dla feedu i opisów produktów tylko z danych produktu oraz diagnostyki. Zachowaj faktyczne atrybuty i sprawdź propozycję przed każdym zapisem.
    refusal_rules:
      - Odmów twierdzeń o produkcie, których nie ma w danych produktu.
      - Odmów zapisu do feedu bez sprawdzenia i audytu.
    output_contract: Akcja dla feedu lub opisu produktu z dowodami produktu.

  - id: linkedin_content_playbook
    family: linkedin_content_playbook
    title: Publikacje LinkedIn
    card_type: social_pattern_card
    source_anchors:
      - LinkedIn Posts API
      - WILQ source content
    required_evidence:
      - organization_id
      - source_content
      - platform_permission_state
      - evidence_ids
    maps_to_opportunity_types:
      - social_post_candidate
    maps_to_action_types:
      - linkedin_post_candidate
    expert_rule_ids:
      - linkedin_rules_v1
      - content_social_limits_v1
    compact_playbook: Przygotuj kandydatów postów organizacji z treści źródłowej i stanu uprawnień. Publikacja wymaga uprawnień źródła danych i sprawdzenia przez człowieka.
    refusal_rules:
      - Odmów twierdzeń w publicznym poście bez treści źródłowej.
      - Odmów publikacji bez uprawnień organizacji.
    output_contract: Akcja posta LinkedIn z dowodami i podglądem zmiany.

  - id: facebook_content_playbook
    family: facebook_content_playbook
    title: Publikacje Facebook
    card_type: social_pattern_card
    source_anchors:
      - Facebook Pages API
      - WILQ source content
    required_evidence:
      - page_id
      - source_content
      - page_permission_state
      - evidence_ids
    maps_to_opportunity_types:
      - social_post_candidate
    maps_to_action_types:
      - facebook_post_candidate
    expert_rule_ids:
      - facebook_rules_v1
      - content_social_limits_v1
    compact_playbook: Przygotuj kandydatów postów strony Facebook z treści opartej o źródła i stanu uprawnień strony. Publikacja pozostaje zwalidowaną akcją.
    refusal_rules:
      - Odmów postów strony bez treści źródłowej i identyfikatora strony.
      - Odmów niewspartych obietnic promocyjnych.
    output_contract: Akcja posta Facebook z dowodami i podglądem zmiany.

  - id: wordpress_content_refresh_playbook
    family: wordpress_content_refresh_playbook
    title: Odświeżanie treści WordPress
    card_type: content_card
    source_anchors:
      - WordPress REST API
      - "GSC: wymiary zapytanie/strona"
    required_evidence:
      - content_inventory
      - target_page
      - query_page_metrics
      - evidence_ids
    maps_to_opportunity_types:
      - wordpress_content_refresh
      - wordpress_duplicate_content_risk
      - content_brief_candidate
    maps_to_action_types:
      - refresh_existing_content
      - merge_candidate
      - new_content_brief
    expert_rule_ids:
      - content_duplication_rules_v1
      - content_brief_rules_v1
      - seo_query_page_matrix_v1
    compact_playbook: Preferuj odświeżenie albo scalenie istniejącej treści WordPress, gdy spis treści potwierdza pasującą stronę. Nowe briefy wymagają dowodu, że nie ma pasującej strony.
    refusal_rules:
      - Odmów tworzenia zduplikowanej treści bez dowodów ze spisu treści.
      - Odmów edycji treści bez ścieżki źródłowej.
    output_contract: Kandydat akcji treści WordPress ze spisem treści i dowodami źródłowymi.
